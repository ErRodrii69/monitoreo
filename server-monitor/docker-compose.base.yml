# =============================================================
# docker-compose.base.yml — Base: solo la base de datos
#
# Contiene únicamente el servicio de PostgreSQL.
# Los demás docker-compose.*.yml extienden este fichero.
#
# Uso directo (solo BD):
#   docker compose -f docker-compose.base.yml up -d
# =============================================================

services:

  db:
    image: postgres:16-alpine
    container_name: serverwatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-monitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitor}
      POSTGRES_DB:       ${POSTGRES_DB:-servermonitor}
    volumes:
      # Persistencia de datos fuera del contenedor
      - pgdata:/var/lib/postgresql/data
    ports:
      # Exponemos el puerto para poder conectarse con clientes externos (desarrollo)
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-monitor} -d ${POSTGRES_DB:-servermonitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
